<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --br:#FA0050;--brd:#D4003F;--brl:#FFF0F4;
  --bg:#F7F7F8;--cd:#FFFFFF;
  --bd:#EBEBED;--bd2:#F2F2F4;
  --t1:#111114;--t2:#6B6B78;--t3:#AFAFB8;
  --gn:#16A34A;--gnb:#F0FDF4;--gnr:#BBF7D0;
  --am:#B45309;--amb:#FFFBEB;--amr:#FDE68A;
  --rd:#DC2626;--rdb:#FFF1F2;--rdr:#FECACA;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --r1:10px;--r2:14px;
  --sidebar:220px;
}

html,body{height:100%;background:var(--bg);font-family:'DM Sans',system-ui,sans-serif;color:var(--t1)}

/* ── LAYOUT ── */
#layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--cd);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;z-index:100;
}
.sb-logo{
  padding:24px 20px 20px;
  border-bottom:1px solid var(--bd2);
  display:flex;align-items:center;gap:10px;
}
.sb-logo-mark{
  width:32px;height:32px;border-radius:9px;
  background:var(--br);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;letter-spacing:-.5px;
  flex-shrink:0;
}
.sb-logo-text{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.sb-logo-badge{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.3px;text-transform:uppercase;margin-top:1px}

.sb-nav{flex:1;padding:10px 10px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:14px 10px 6px}
.sb-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--r1);
  cursor:pointer;font-size:13px;font-weight:500;color:var(--t2);
  transition:background .12s,color .12s;
  border:none;background:none;width:100%;text-align:left;
}
.sb-item:hover{background:var(--bg);color:var(--t1)}
.sb-item.active{background:var(--brl);color:var(--br);font-weight:600}
.sb-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--br);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-badge.am{background:var(--am)}

.sb-footer{
  padding:14px 16px;border-top:1px solid var(--bd2);
  font-size:12px;color:var(--t3);
}
.sb-footer strong{display:block;font-size:13px;font-weight:600;color:var(--t2);margin-bottom:2px}

/* ── MAIN ── */
#main{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column}

.topbar{
  background:var(--cd);border-bottom:1px solid var(--bd);
  padding:0 32px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.topbar-title{font-size:15px;font-weight:700;color:var(--t1)}
.topbar-actions{display:flex;align-items:center;gap:10px}

.content{padding:32px;flex:1}

/* ── CARDS ── */
.card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--sh)}
.card-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.card-body{padding:20px 24px}
.card-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card-value{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-1px;line-height:1}
.card-sub{font-size:12px;color:var(--t2);margin-top:5px;font-weight:500}
.card-trend{font-size:12px;font-weight:600;margin-top:4px}
.card-trend.up{color:var(--gn)}
.card-trend.down{color:var(--rd)}
.card-trend.warn{color:var(--am)}

/* ── METRICS GRID ── */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.metric-card{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);padding:20px;box-shadow:var(--sh)}
.metric-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.metric-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.metric-icon.br{background:var(--brl);color:var(--br)}
.metric-icon.gn{background:var(--gnb);color:var(--gn)}
.metric-icon.am{background:var(--amb);color:var(--am)}
.metric-icon.rd{background:var(--rdb);color:var(--rd)}

/* ── TABLE ── */
.table-wrap{overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{
  font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;
  padding:10px 16px;text-align:left;background:var(--bg);border-bottom:1px solid var(--bd);
}
tbody tr{border-bottom:1px solid var(--bd2);cursor:pointer;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg)}
td{padding:13px 16px;font-size:13px;color:var(--t1);vertical-align:middle}
td.muted{color:var(--t2)}
td.right{text-align:right}

/* ── STATUS BADGES ── */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge.activo{background:var(--gnb);color:var(--gn)}.badge.activo::before{background:var(--gn)}
.badge.suspendido{background:var(--rdb);color:var(--rd)}.badge.suspendido::before{background:var(--rd)}
.badge.trial{background:var(--amb);color:var(--am)}.badge.trial::before{background:var(--am)}
.badge.vencido{background:#F3F4F6;color:var(--t2)}.badge.vencido::before{background:var(--t3)}
.badge.acreditado{background:var(--gnb);color:var(--gn)}.badge.acreditado::before{background:var(--gn)}
.badge.pendiente{background:var(--amb);color:var(--am)}.badge.pendiente::before{background:var(--am)}
.badge.rechazado{background:var(--rdb);color:var(--rd)}.badge.rechazado::before{background:var(--rd)}

/* ── ACTIVITY BAR ── */
.act-bar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden;width:80px}
.act-bar-fill{height:100%;border-radius:3px;background:var(--br)}
.act-label{font-size:11px;font-weight:600;margin-top:3px}
.act-label.alto{color:var(--gn)}
.act-label.medio{color:var(--am)}
.act-label.bajo{color:var(--rd)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r1);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity .12s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--br);color:#fff}
.btn-primary:hover{background:var(--brd)}
.btn-secondary{background:var(--cd);color:var(--t1);border:1px solid var(--bd)}
.btn-secondary:hover{background:var(--bg)}
.btn-danger{background:var(--rdb);color:var(--rd);border:1px solid var(--rdr)}
.btn-danger:hover{background:#fde8e8}
.btn-sm{padding:5px 11px;font-size:12px}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── SEARCH & FILTERS ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.search-input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--bd);border-radius:var(--r1);font-size:13px;font-family:inherit;background:var(--cd);color:var(--t1);outline:none}
.search-input:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(250,0,80,.08)}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--cd);color:var(--t2);transition:all .12s}
.chip:hover{border-color:var(--t2);color:var(--t1)}
.chip.on{background:var(--br);border-color:var(--br);color:#fff}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:16px;font-weight:700;color:var(--t1)}
.sec-sub{font-size:13px;color:var(--t2);margin-top:1px}

/* ── ALERTS LIST ── */
.alert-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-bottom:1px solid var(--bd2);
  cursor:pointer;transition:background .1s;
}
.alert-item:last-child{border-bottom:none}
.alert-item:hover{background:var(--bg)}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-dot.warn{background:var(--am)}
.alert-dot.danger{background:var(--rd)}
.alert-dot.ok{background:var(--gn)}
.alert-text{flex:1;font-size:13px;color:var(--t1)}
.alert-text span{color:var(--t2);font-size:12px;display:block;margin-top:1px}
.alert-chv{color:var(--t3)}

/* ── MODAL OVERLAY ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.vis{opacity:1;pointer-events:all}
.modal{
  background:var(--cd);border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.18);
  width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
  transform:translateY(12px);transition:transform .2s;
}
.modal-overlay.vis .modal{transform:translateY(0)}
.modal-head{padding:24px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.modal-close{border:none;background:none;cursor:pointer;color:var(--t3);padding:2px;font-size:20px;line-height:1}
.modal-close:hover{color:var(--t1)}
.modal-body{padding:20px 24px 24px}

/* ── FORM ELEMENTS ── */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;letter-spacing:.1px}
.fi,.fs,.fta{
  width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:var(--r1);
  font-size:14px;font-family:inherit;color:var(--t1);background:var(--cd);
  outline:none;transition:border-color .12s,box-shadow .12s;
}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--br);box-shadow:0 0 0 3px rgba(250,0,80,.08)}
.fta{resize:vertical;min-height:80px}

/* ── DETAIL PANELS ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.detail-box{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);padding:18px 20px;box-shadow:var(--sh)}
.detail-box-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.detail-field{margin-bottom:10px}
.detail-field:last-child{margin-bottom:0}
.detail-field-label{font-size:11px;color:var(--t3);margin-bottom:2px}
.detail-field-value{font-size:14px;font-weight:500;color:var(--t1)}

/* ── STAT PILLS (detail) ── */
.stat-pills{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-pill{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);padding:16px;text-align:center;box-shadow:var(--sh)}
.stat-pill-val{font-size:24px;font-weight:800;color:var(--t1);letter-spacing:-1px}
.stat-pill-lbl{font-size:11px;color:var(--t2);margin-top:3px;font-weight:500}

/* ── BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t2);margin-bottom:24px}
.breadcrumb a{color:var(--t2);text-decoration:none;cursor:pointer}
.breadcrumb a:hover{color:var(--br)}
.breadcrumb svg{width:14px;height:14px;stroke:var(--t3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.breadcrumb strong{color:var(--t1);font-weight:600}

/* ── SUSPENSION BANNER ── */
.suspension-banner{
  background:var(--rdb);border:1px solid var(--rdr);border-radius:var(--r2);
  padding:14px 18px;display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;
}
.suspension-banner svg{width:18px;height:18px;stroke:var(--rd);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-top:1px}
.suspension-banner-text{flex:1;font-size:13px;color:var(--rd);font-weight:500}
.suspension-banner-text strong{display:block;font-size:14px;font-weight:700;margin-bottom:2px}

/* ── DIVIDER ── */
.dv{height:1px;background:var(--bd);margin:20px 0}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 24px;color:var(--t3)}
.empty svg{width:40px;height:40px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 14px;display:block}
.empty-title{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:6px}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--t1);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:600;z-index:500;opacity:0;
  transition:all .22s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── NOTA INTERNA ── */
.nota{background:var(--amb);border-radius:var(--r1);padding:10px 14px;font-size:13px;color:var(--am);font-style:italic}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.metrics-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:800px){
  #sidebar{width:56px}
  .sb-logo-text,.sb-logo-badge,.sb-section,.sb-item span,.sb-footer{display:none}
  .sb-item{justify-content:center;padding:10px}
  #main{margin-left:56px}
  .metrics-grid{grid-template-columns:1fr 1fr}
  .detail-grid{grid-template-columns:1fr}
}

/* ── USER DETAIL: TWO-COLUMN LAYOUT ── */
.ud-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start}
.ud-main{min-width:0}
.ud-sidebar{position:sticky;top:72px}

/* ── SECTION BLOCK ── */
.sec-block{background:var(--cd);border:1px solid var(--bd);border-radius:var(--r2);box-shadow:var(--sh);margin-bottom:14px;overflow:hidden}
.sec-block-head{padding:12px 20px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;justify-content:space-between}
.sec-block-title{font-size:13px;font-weight:700;color:var(--t1);letter-spacing:-.1px}
.sec-block-body{padding:14px 20px}

/* ── FIELD ROWS ── */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.field-row{padding:6px 0;border-bottom:1px solid var(--bd2);display:flex;align-items:baseline;gap:8px}
.field-row:last-child{border-bottom:none}
.field-lbl{font-size:11px;color:var(--t3);width:140px;flex-shrink:0;font-weight:500}
.field-val{font-size:13px;color:var(--t1);font-weight:500;flex:1}
.field-val.field-empty{color:var(--t3);font-style:italic}
.field-val a{color:var(--br);text-decoration:none}
.field-val a:hover{text-decoration:underline}
.field-req{font-size:10px;color:var(--br);font-weight:600;margin-left:4px}
.field-opt{font-size:10px;color:var(--t3);margin-left:4px}

/* ── SUBSCRIPTION SIDEBAR ── */
.sub-status-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--bd2)}
.sub-status-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sub-field{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bd2);font-size:12px}
.sub-field:last-of-type{border-bottom:none}
.sub-field-lbl{color:var(--t3);font-weight:500}
.sub-field-val{color:var(--t1);font-weight:600;text-align:right}
.sub-actions{display:flex;flex-direction:column;gap:6px;margin-top:16px;padding-top:16px;border-top:1px solid var(--bd2)}

/* ── INSIGHT CARDS ── */
.ins-fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ins-card{background:var(--bg);border-radius:var(--r1);padding:14px}
.ins-card-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.ins-card-val{font-size:20px;font-weight:800;color:var(--t1);letter-spacing:-.5px;line-height:1}
.ins-card-delta{font-size:11px;font-weight:600;margin-top:4px}
.ins-card-delta.up{color:var(--gn)}
.ins-card-delta.down{color:var(--rd)}
.ins-card-delta.neutral{color:var(--t3)}
.ins-card-sub{font-size:11px;color:var(--t2);margin-top:2px}

/* ── MARGIN LABEL ── */
.margin-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px}
.margin-chip.excelente{background:#EEF2FF;color:#4338CA}
.margin-chip.saludable{background:var(--gnb);color:var(--gn)}
.margin-chip.aceptable{background:#EFF6FF;color:#1D4ED8}
.margin-chip.bajo{background:var(--amb);color:var(--am)}
.margin-chip.critico{background:var(--rdb);color:var(--rd)}

/* ── DIAGNÓSTICO BANNER ── */
.diag-banner{border-radius:var(--r2);padding:14px 18px;display:flex;align-items:flex-start;gap:12px;margin-bottom:16px}
.diag-banner.creciendo{background:#F0FDF4;border:1px solid #BBF7D0}

<script>
// ═══════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════

var ADMIN_UID = 'XYfD6T0PvEYUtZVpFw4YTvbjEzf2';

var DB = {
  config: { plan_precio: 2000, plan_nombre: 'Base', dias_gracia: 7 },
  usuarios: [],
  pagos: []
};

// ═══════════════════════════════════════════════════
//  CARGA DE DATOS REALES — Firestore
// ═══════════════════════════════════════════════════
function hoyStr(){ return new Date().toISOString().slice(0,10); }

// Traduce el D.empresa / D.persona de usuario.html al esquema que usa esta UI
function mapUsuario(uid, D, cliente){
  D = D || {};
  var p = D.persona || {};
  var e = D.empresa || {};
  var ped = D.ped || [];
  var pi = D.pi || [];
  var pt = D.pt || [];
  var rec = D.rec || [];

  function pedTot(id){
    var pedido = ped.find(function(x){return x.id===id;});
    var items = pi.filter(function(i){return i.d===id;}).reduce(function(s,i){return s+i.v*i.q;},0);
    return items + (pedido&&pedido.pe?pedido.pe:0);
  }

  // últimos 6 meses calendario, dinámico
  var meses=[], mesesLbl=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var hoy=new Date();
  for(var i=5;i>=0;i--){
    var d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    meses.push({per:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'), lbl:mesesLbl[d.getMonth()]});
  }
  var ventas=[],costos_fijos=[],ticket_promedio=[],pedidos_mes=[];
  meses.forEach(function(m){
    var ps=ped.filter(function(x){return (x.f||'').indexOf(m.per)===0;});
    var v=ps.reduce(function(s,x){return s+pedTot(x.id);},0);
    var gi=(D.gi||[]).filter(function(x){return x.p===m.per;}).reduce(function(s,x){return s+x.v;},0);
    ventas.push(Math.round(v));
    costos_fijos.push(Math.round(gi));
    pedidos_mes.push(ps.length);
    ticket_promedio.push(ps.length?Math.round(v/ps.length):0);
  });
  // costo variable ≈ 60% de la venta como estimación cuando no hay recetas cargadas; si hay recetas, se usa el costo real vigente
  function costoActual(ptId){
    return rec.filter(function(r){return r.pt===ptId;}).reduce(function(s,r){
      var lista = r.t==='MP'?(D.mpp||[]):(D.mep||[]);
      var last=lista.filter(function(x){return x.m===r.i;}).sort(function(a,b){return b.f.localeCompare(a.f);})[0];
      return s+(last?last.v:0)*r.q;
    },0);
  }
  var costoPorPt={};
  pt.forEach(function(x){costoPorPt[x.id]=costoActual(x.id);});
  var costos_var=meses.map(function(m,idx){
    var ps=ped.filter(function(x){return (x.f||'').indexOf(m.per)===0;});
    var c=0;
    ps.forEach(function(pd){
      pi.filter(function(i){return i.d===pd.id;}).forEach(function(it){
        c += (costoPorPt[it.pt]||0) * it.q;
      });
    });
    return Math.round(c);
  });

  var pedidos30=ped.filter(function(x){
    if(!x.f) return false;
    var dias=(hoy-new Date(x.f))/(1000*60*60*24);
    return dias>=0 && dias<=30;
  }).length;
  var ultimoPedido=ped.slice().sort(function(a,b){return (b.f||'').localeCompare(a.f||'');})[0];
  var ultimaActividad = D._ultimaActividad ? D._ultimaActividad.slice(0,10) : (ultimoPedido?ultimoPedido.f:'');

  return {
    id: uid,
    estado: cliente.estado || 'activo',
    plan: cliente.plan || (cliente.estado==='trial'?'—':'Base'),
    fecha_vencimiento: cliente.fecha_vencimiento || '',
    license_key: cliente.license_key || '',
    suspension_msg: cliente.suspension_msg || '',
    notas: cliente.notas || '',
    persona: {
      // si el usuario nunca inició sesión (creado desde el admin), usar los datos precargados en clientes/{uid}
      nombre: p.nombre || cliente.nombre_precarga || '', apellido: p.apellido || cliente.apellido_precarga || '',
      email: p.email || cliente.email_precarga || '',
      tel: p.tel || cliente.tel_precarga || '', dni: p.dni||'', cargo: p.cargo||'',
      fecha_registro: D.fecha_registro || cliente.fecha_alta || ''
    },
    empresa: {
      tipo: 'fisica',
      nombre_comercial: e.nombre || (D.neg&&D.neg.nombre) || cliente.negocio_precarga || '(pendiente de primer inicio de sesión)',
      razon_social: e.razon||'', cuit: e.cuit||'', cond_iva: e.iva||'',
      inicio_actividades: e.inicio||'', provincia: e.provincia||'', localidad: e.localidad||'',
      direccion: e.dir||'', web: e.web||'', instagram: e.ig||'', facebook: e.fb||''
    },
    actividad: {
      pedidos: ped.length, productos: pt.length, clientes: (D.cli||[]).length,
      ingredientes: (D.mp||[]).length,
      recetas: (function(){ var set={}; rec.forEach(function(r){set[r.pt]=1;}); return Object.keys(set).length; })(),
      proveedores: (D.pvs||[]).length,
      sesiones_30d: pedidos30, // proxy: pedidos cargados en los últimos 30 días (no hay tracking real de logins todavía)
      ultima_sesion: ultimaActividad,
      ultimo_pedido: ultimoPedido?ultimoPedido.f:''
    },
    insights: { ventas:ventas, costos_var:costos_var, costos_fijos:costos_fijos, meses:meses.map(function(m){return m.lbl;}), ticket_promedio:ticket_promedio, pedidos_mes:pedidos_mes }
  };
}

async function cargarDatosReales(){
  var db=window._db;
  var usersSnap = await window._fbGetDocs(window._fbCollection(db,'users'));
  var clientesSnap = await window._fbGetDocs(window._fbCollection(db,'clientes'));
  var usersMap = {};
  usersSnap.forEach(function(d){ usersMap[d.id]=d.data(); });
  var clientesMap = {};
  clientesSnap.forEach(function(d){ clientesMap[d.id]=d.data(); });

  // Unión de UIDs: cubre clientes creados desde el admin que todavía no iniciaron sesión
  // (todavía no tienen doc en users/) y usuarios que ya usan la app.
  var uids = Object.keys(Object.assign({}, usersMap, clientesMap));

  DB.usuarios = [];
  uids.forEach(function(uid){
    DB.usuarios.push(mapUsuario(uid, usersMap[uid]||{}, clientesMap[uid]||{}));
  });

  // Pagos: subcolección clientes/{uid}/pagos
  DB.pagos = [];
  for(var i=0;i<DB.usuarios.length;i++){
    var uid=DB.usuarios[i].id;
    try{
      var pagosSnap = await window._fbGetDocs(window._fbCollection(db,'clientes',uid,'pagos'));
      pagosSnap.forEach(function(d){
        var pg=d.data(); pg.id=d.id; pg.uid=uid;
        DB.pagos.push(pg);
      });
    }catch(e){ /* sin pagos registrados aún para este cliente */ }
  }

  // Config global
  try{
    var cfgSnap = await window._fbGetDoc(window._fbDoc(db,'config','global'));
    if(cfgSnap.exists()) DB.config = Object.assign(DB.config, cfgSnap.data());
  }catch(e){}
}

// Merge parcial en clientes/{uid} (no pisa el resto de los campos)
function guardarCliente(uid, data){
  return window._fbSetDoc(window._fbDoc(window._db,'clientes',uid), data, {merge:true});
}

// ═══════════════════════════════════════════════════
//  EXPORTAR DATOS DE USUARIO (Excel)
//  Mismas 16 hojas / mismas columnas que "Más → Exportar datos"
//  en responsive9.html. A diferencia de esa versión, acá NO hay
//  paso de período (el admin exporta todo el historial de cada
//  dataset elegido) — solo se replica el paso de elegir carpeta
//  y datasets individuales.
//
//  Ojo: buildExportDatasetsAdm(D) recibe el D crudo de un usuario
//  puntual como parámetro y todas sus funciones internas (fmtD,
//  costo, pedTot, etc.) cierran sobre ESE D, no sobre una D global.
//  Esto es intencional: nunca hay una D global en el admin, así
//  que no hay forma de mezclar datos de dos negocios distintos.
//
//  Limitación conocida: si algún usuario viejo tiene datos de
//  personal en el esquema legacy D.sueldos (previo a la migración
//  a D.pagosPersonal) y todavía no abrió la app para migrarlos,
//  la hoja "Pagos al personal" saldrá vacía para esa cuenta. No
//  debería aplicar a las cuentas de prueba nuevas.
// ═══════════════════════════════════════════════════
var ADMEXP=null; // estado del wizard: {uid,step,catId,sel}

var EXPORT_CATS_ADM=[
  {id:'catalogo',t:'Productos y catálogo',s:'Productos, recetas, ingredientes y empaques'},
  {id:'ventas',t:'Pedidos y ventas',s:'Pedidos, ventas detalladas y cobranzas'},
  {id:'clientes',t:'Clientes',s:'Cartera de clientes'},
  {id:'proveedores',t:'Proveedores',s:'Proveedores'},
  {id:'finanzas',t:'Gastos fijos',s:'Luz, gas, alquiler, sueldos y más'},
  {id:'personal',t:'Personal y pagos',s:'Empleados, horas y pagos'},
  {id:'todo',t:'Todo el negocio',s:'Exportación completa (todas las carpetas)'}
];

function buildExportDatasetsAdm(D){
  function fmtD(d){if(!d)return'';var p=String(d).split('-');return p[2]+'/'+p[1]+'/'+p[0];}
  function pad2(n,len){return String(n==null?0:n).padStart(len,'0');}
  function perLbl(p){if(!p)return'';var MOS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];var a=p.split('-');return MOS[parseInt(a[1])-1]+' '+a[0];}
  function _nm(arr,id){var it=(arr||[]).find(function(x){return x.id===id;});return it?it.n:'';}
  function _pedNumStr(p){if(p&&p.num){var anio=(p.f||'').split('-')[0];return '#'+anio+'-'+pad2(p.num,3);}return p?p.id:'';}
  function _inPeriod(dateStr,from,to){if(!dateStr)return false;if(!from&&!to)return true;if(from&&dateStr<from)return false;if(to&&dateStr>to)return false;return true;}
  function _inPeriodYM(pStr,from,to){if(!pStr)return false;if(!from&&!to)return true;var f=from?from.slice(0,7):null,t=to?to.slice(0,7):null;if(f&&pStr<f)return false;if(t&&pStr>t)return false;return true;}
  function _rnd(n){return Math.round((n||0)*100)/100;}
  function _pct(num,den){return den?_rnd(num/den*100):0;}
  function latMp(id){var s=(D.mpp||[]).filter(function(p){return p.m===id;}).sort(function(a,b){return b.f.localeCompare(a.f);});return s[0]?s[0].v:0;}
  function latMe(id){var s=(D.mep||[]).filter(function(p){return p.m===id;}).sort(function(a,b){return b.f.localeCompare(a.f);});return s[0]?s[0].v:0;}
  function costo(ptId){return (D.rec||[]).filter(function(r){return r.pt===ptId;}).reduce(function(s,i){return s+(i.t==='MP'?latMp(i.i):latMe(i.i))*i.q;},0);}
  function pedTot(id){var p=(D.ped||[]).find(function(x){return x.id===id;});if(p&&p.anulado)return 0;return (D.pi||[]).filter(function(i){return i.d===id;}).reduce(function(s,i){return s+i.v*i.q;},0)+(p?p.pe:0);}
  function pedCob(id){return (D.cob||[]).filter(function(c){return c.d===id&&!c.anulado;}).reduce(function(s,c){return s+c.v;},0);}
  function pedEst(id){var p=(D.ped||[]).find(function(x){return x.id===id;});if(p&&p.anulado)return 'anulado';var t=pedTot(id),c=pedCob(id);return c<=0?'sin':c>=t?'cob':'par';}
  function conceptoNombre(id){var c=(D.conceptosPago||[]).find(function(x){return x.id===id;});return c?c.n:id;}
  function _costoUnitPT(ptId){var pt=(D.pt||[]).find(function(p){return p.id===ptId;});var yld=(pt&&pt.yields)||1;return costo(ptId)/yld;}
  function _costoMPUnitPT(ptId){var pt=(D.pt||[]).find(function(p){return p.id===ptId;});var yld=(pt&&pt.yields)||1;var t=(D.rec||[]).filter(function(r){return r.pt===ptId&&r.t==='MP';}).reduce(function(s,r){return s+latMp(r.i)*r.q;},0);return t/yld;}
  function _costoMEUnitPT(ptId){var pt=(D.pt||[]).find(function(p){return p.id===ptId;});var yld=(pt&&pt.yields)||1;var t=(D.rec||[]).filter(function(r){return r.pt===ptId&&r.t==='ME';}).reduce(function(s,r){return s+latMe(r.i)*r.q;},0);return t/yld;}
  function _precioAt(list,id,date){
    var antes=list.filter(function(p){return p.m===id&&p.f<=date;}).sort(function(a,b){return b.f.localeCompare(a.f);});
    if(antes.length)return antes[0].v;
    var cualquiera=list.filter(function(p){return p.m===id;}).sort(function(a,b){return a.f.localeCompare(b.f);});
    return cualquiera.length?cualquiera[0].v:0;
  }
  function _precioMpAt(id,date){return _precioAt(D.mpp||[],id,date);}
  function _precioMeAt(id,date){return _precioAt(D.mep||[],id,date);}
  function _costoRecetaAt(ptId,date){
    var pt=(D.pt||[]).find(function(p){return p.id===ptId;});var yld=(pt&&pt.yields)||1;
    var total=(D.rec||[]).filter(function(r){return r.pt===ptId;}).reduce(function(s,r){return s+(r.t==='MP'?_precioMpAt(r.i,date):_precioMeAt(r.i,date))*r.q;},0);
    return total/yld;
  }

  return [

function _slugExp(s){return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]+/g,'')||'Datos';}

function _downloadXLSXAdm(sheets,fname){
  var wb=XLSX.utils.book_new();
  var usedNames=[];
  sheets.forEach(function(sh){
    var aoa=[sh.cols].concat(sh.rows);
    var ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=sh.cols.map(function(c,ci){
      var maxLen=String(c).length;
      sh.rows.forEach(function(r){var v=r[ci];var l=(v==null?'':String(v)).length;if(l>maxLen)maxLen=l;});
      return {wch:Math.min(Math.max(maxLen+2,10),40)};
    });
    var base=sh.name.replace(/[\\/?*\[\]:]/g,'').slice(0,31)||'Hoja';
    var name=base,n=1;
    while(usedNames.indexOf(name)>=0){n++;name=(base.slice(0,28)+'_'+n);}
    usedNames.push(name);
    XLSX.utils.book_append_sheet(wb,ws,name);
  });
  XLSX.writeFile(wb,fname+'.xlsx');
}

async function generarExportAdm(){
  var dsIds=Object.keys(ADMEXP.sel).filter(function(k){return ADMEXP.sel[k];});
  if(!dsIds.length){alert('Elegí al menos un dato para exportar.');return;}
  var uid=ADMEXP.uid;
  var u=userById(uid);
  var btn=$('exp-gen-btn');
  if(btn){btn.disabled=true;btn.textContent='Generando…';}
  try{
    var snap=await window._fbGetDoc(window._fbDoc(window._db,'users',uid));
    if(!snap.exists()){
      alert('Este usuario todavía no cargó datos en la app (nunca inició sesión), así que no hay nada para exportar.');
      if(btn){btn.disabled=false;btn.textContent='📊 Generar Excel';}
      return;
    }

      ['Exportación',catLbl],
      ['Generado el',hoyStr()],
      ['Datos incluidos',selected.map(function(d){return d.label;}).join(', ')]
    ]}];
    selected.forEach(function(ds){sheets.push({name:ds.label,cols:ds.cols,rows:ds.rows()});});

  }finally{
    if(btn){btn.disabled=false;btn.textContent='📊 Generar Excel';}
  }
}

// ═══════════════════════════════════════════════════
//  COPIA DE SEGURIDAD (backup + restore)
//  Backup: descarga un .zip con un JSON por usuario, cada uno con
//  su users/{uid} + clientes/{uid} + historial de pagos (informativo).
//  Restore: reemplaza POR COMPLETO users/{uid} y clientes/{uid} de
//  UN usuario a la vez, con confirmación por texto. No toca Firebase
//  Authentication — si la cuenta de Auth fue borrada, restaurar el
//  Firestore no le devuelve el acceso al usuario.
// ═══════════════════════════════════════════════════
var ADMRESTORE=null; // {parsed, contextUid, nombreConfirm}

function _triggerBlobDownloadAdm(blob,fname){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=fname;document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},0);
}

function fmtFechaHoraAdm(iso){
  if(!iso)return'';
  var d=new Date(iso);
  if(isNaN(d.getTime()))return'';
  var months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  var hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');
  return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear()+', '+hh+':'+mm;
}

async function descargarBackupCompleto(){
  var btn=$('backup-download-btn');
  if(btn){btn.disabled=true;btn.textContent='Generando…';}
  try{
    var db=window._db;
    var usersSnap=await window._fbGetDocs(window._fbCollection(db,'users'));
    var clientesSnap=await window._fbGetDocs(window._fbCollection(db,'clientes'));
    var usersMap={};usersSnap.forEach(function(d){usersMap[d.id]=d.data();});
    var clientesMap={};clientesSnap.forEach(function(d){clientesMap[d.id]=d.data();});
    var uids=Object.keys(Object.assign({},usersMap,clientesMap));
    if(!uids.length){
      alert('No hay usuarios para respaldar todavía.');
      if(btn){btn.disabled=false;btn.textContent='📥 Descargar backup completo';}
      return;
    }
    var zip=new JSZip();
    var generadoEl=new Date().toISOString();
    var usedNames=[];
    for(var i=0;i<uids.length;i++){
      var uid=uids[i];
      var D=usersMap[uid]||{};
      var cliente=clientesMap[uid]||{};
      var pagos=[];
      try{
        var pagosSnap=await window._fbGetDocs(window._fbCollection(db,'clientes',uid,'pagos'));
        pagosSnap.forEach(function(d){var pg=d.data();pg.id=d.id;pagos.push(pg);});
      }catch(e){ /* sin pagos registrados para este usuario */ }
      var negocio=(D.empresa&&D.empresa.nombre_comercial)||(D.neg&&D.neg.nombre)||cliente.negocio_precarga||'Sin_nombre';
      var payload={uid:uid,generadoEl:generadoEl,negocio:negocio,usuario:D,cliente:cliente,pagos:pagos};
      var base=_slugExp(negocio)+'_'+uid,name=base,n=1;
      while(usedNames.indexOf(name)>=0){n++;name=base+'_'+n;}
      usedNames.push(name);
      zip.file(name+'.json',JSON.stringify(payload,null,2));
    }
    var blob=await zip.generateAsync({type:'blob'});
    _triggerBlobDownloadAdm(blob,'Gula_Backup_'+hoyStr()+'.zip');
    showToast('✅ Backup generado: '+uids.length+' usuario'+(uids.length===1?'':'s'));
  }catch(e){
    alert('Error al generar el backup: '+e.message);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='📥 Descargar backup completo';}
  }
}

// contextUid: si se sube desde la ficha de un usuario puntual, para poder
// avisar si el archivo subido pertenece a otro negocio.
function triggerRestoreUpload(contextUid){
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='application/json,.json';
  inp.onchange=function(e){
    var file=e.target.files[0];
    if(!file)return;
    leerArchivoBackup(file,contextUid||null);
  };
  inp.click();
}

function leerArchivoBackup(file,contextUid){
  var reader=new FileReader();
  reader.onload=function(e){
    var parsed;
    try{ parsed=JSON.parse(e.target.result); }
    catch(err){ alert('Ese archivo no es un JSON válido.'); return; }
    if(!parsed||!parsed.uid||!parsed.usuario){
      alert('Ese archivo no tiene el formato esperado de un backup de Gula.');
      return;
    }
    ADMRESTORE={parsed:parsed,contextUid:contextUid||null};
    abrirModalRestore();
  };
  reader.onerror=function(){alert('No se pudo leer el archivo.');};
  reader.readAsText(file);
}

function checkRestoreConfirm(val){
  var btn=$('restore-confirm-btn');
  if(!btn||!ADMRESTORE)return;
  var target=(ADMRESTORE.nombreConfirm||'').trim().toLowerCase();
  btn.disabled=val.trim().toLowerCase()!==target;
}

function abrirModalRestore(){
  var p=ADMRESTORE.parsed;
  var mismatch=ADMRESTORE.contextUid&&ADMRESTORE.contextUid!==p.uid;
  var actual=userById(p.uid);
  var nombreConfirm=(actual&&actual.empresa&&actual.empresa.nombre_comercial)||p.negocio||p.uid;
  ADMRESTORE.nombreConfirm=nombreConfirm;
  var body='';
  if(mismatch){
    body+='<div style="background:var(--amb, #fef3c7);border:1px solid #f59e0b;border-radius:var(--r1);padding:12px 14px;margin-bottom:16px;font-size:13px;color:#92400e">';
    body+='⚠️ Este archivo pertenece a <strong>'+esc(p.negocio||p.uid)+'</strong>, no al negocio de la ficha en la que estás parado. Si continuás, vas a restaurar los datos del negocio del archivo.';
    body+='</div>';
  }
  body+='<div style="background:var(--rdb);border:1px solid var(--rdr);border-radius:var(--r1);padding:12px 14px;margin-bottom:18px;font-size:13px;color:var(--rd)">';
  body+='Vas a reemplazar <strong>todos</strong> los datos actuales de <strong>'+esc(p.negocio||p.uid)+'</strong> por la versión del backup generado el '+esc(fmtFechaHoraAdm(p.generadoEl)||'fecha desconocida')+'. Lo que se haya cargado después para este negocio se pierde para siempre. Esto no afecta el acceso del usuario (Firebase Authentication no se toca).';
  body+='</div>';

async function ejecutarRestore(){
  if(!ADMRESTORE)return;
  var p=ADMRESTORE.parsed;
  var btn=$('restore-confirm-btn');
  if(btn){btn.disabled=true;btn.textContent='Restaurando…';}
  try{
    await window._fbSetDoc(window._fbDoc(window._db,'users',p.uid), p.usuario||{});
    await window._fbSetDoc(window._fbDoc(window._db,'clientes',p.uid), p.cliente||{});
    closeModal();
    showToast('✅ Datos restaurados para '+(p.negocio||p.uid));
    await cargarDatosReales();
    if(ST.section==='userDet'&&ST.param===p.uid)renderUserDet();
    else if(ST.section==='usuarios')renderUsuarios();
    else if(ST.section==='dashboard')renderDashboard();
    refreshBadges();
    ADMRESTORE=null;
  }catch(e){
    alert('Error al restaurar los datos: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='🔄 Restaurar datos';}
  }
}

function $(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(n){return '$'+Number(n||0).toLocaleString('es-AR');}
function fmtD(d){
  if(!d)return '—';
  var parts=d.split('-');
  var months=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return parts[2]+' '+months[parseInt(parts[1])-1]+' '+parts[0];
}
function daysFromNow(d){
  if(!d)return 999;
  var diff=new Date(d)-new Date();
  return Math.round(diff/(1000*60*60*24));
}
function lastSeenLabel(d){
  if(!d)return '—';
  var diff=new Date()-new Date(d);
  var days=Math.round(diff/(1000*60*60*24));
  if(days===0)return 'Hoy';
  if(days===1)return 'Ayer';
  return 'Hace '+days+' días';
}
function actLevel(u){
  var s=u.actividad.sesiones_30d;
  if(s>=15)return{lbl:'Alto',pct:100,cls:'alto'};
  if(s>=6)return{lbl:'Medio',pct:50,cls:'medio'};
  return{lbl:'Bajo',pct:15,cls:'bajo'};
}
function badgeHtml(estado){
  var labels={activo:'Activo',suspendido:'Suspendido',trial:'Trial',vencido:'Vencido'};
  return '<span class="badge '+estado+'">'+(labels[estado]||estado)+'</span>';
}
function pagosBadge(estado){
  var labels={acreditado:'Acreditado',pendiente:'Pendiente',rechazado:'Rechazado'};
  return '<span class="badge '+estado+'">'+(labels[estado]||estado)+'</span>';
}

function metricCard(color, icon, label, value, sub, trend){
  var trendHtml='';
  if(trend==='up')trendHtml='<div class="card-trend up">↑ En crecimiento</div>';
  if(trend==='warn')trendHtml='<div class="card-trend warn">⚠ Requiere atención</div>';
  return '<div class="metric-card">'
    +'<div class="metric-icon '+color+'">'+icon+'</div>'
    +'<div class="card-label">'+esc(label)+'</div>'
    +'<div class="card-value">'+esc(String(value))+'</div>'
    +'<div class="card-sub">'+esc(sub)+'</div>'
    +trendHtml
    +'</div>';
}

// ── BUSINESS INSIGHTS ──
function renderInsights(u){
  var ins=u.insights;
  var n=ins.ventas.length;
  var venMes=ins.ventas[n-1]||0;
  var venPrev=ins.ventas[n-2]||0;
  var costVar=ins.costos_var[n-1]||0;
  var costFij=ins.costos_fijos[n-1]||0;
  var costTot=costVar+costFij;
  var ganBruta=venMes-costVar;
  var ganNeta=venMes-costTot;
  var margenBruto=venMes>0?Math.round((ganBruta/venMes)*100):0;
  var margenNeto=venMes>0?Math.round((ganNeta/venMes)*100):0;
  var ticket=ins.ticket_promedio[n-1]||0;
  var ticketPrev=ins.ticket_promedio[n-2]||0;
  var pedidosMes=ins.pedidos_mes[n-1]||0;

  // Trend: compare last 3 months
  var ventas3=ins.ventas.slice(-3);
  var trend3=ventas3[2]-ventas3[0];
  var pctMes=venPrev>0?Math.round(((venMes-venPrev)/venPrev)*100):0;
  var tendencia=trend3>ventas3[0]*0.1?'creciendo':trend3<-ventas3[0]*0.1?'descendiendo':'estable';

  // Diagnóstico
  var diagMap={
    creciendo:{cls:'creciendo',icon:'📈',title:'Negocio en crecimiento',sub:'Ventas '+(pctMes>=0?'+':'')+pctMes+'% vs mes anterior. Rentabilidad '+(margenNeto>=25?'sólida.':margenNeto>=15?'aceptable.':'con margen para mejorar.')},
    estable:{cls:'estable',icon:'➡️',title:'Negocio estable',sub:'Ventas con variación del '+pctMes+'% vs mes anterior. Sin señales de alerta.'},
    descendiendo:{cls:'descendiendo',icon:'📉',title:'Negocio en descenso',sub:'Ventas '+(pctMes)+'% vs mes anterior. Requiere atención comercial.'}
  };
  if(margenNeto<5&&venMes>0)diagMap['descendiendo']={cls:'critico',icon:'🚨',title:'Situación crítica',sub:'Margen neto por debajo del 5%. El negocio está operando casi sin ganancia.'};
  var diag=diagMap[tendencia]||diagMap['estable'];

  // Margin label
  function marginLabel(m){
    if(m>35)return{cls:'excelente',lbl:'Excelente'};
    if(m>25)return{cls:'saludable',lbl:'Saludable'};
    if(m>15)return{cls:'aceptable',lbl:'Aceptable'};
    if(m>5)return{cls:'bajo',lbl:'Bajo'};
    return{cls:'critico',lbl:'Crítico'};
  }
  function delta(cur,prev,invert){
    if(!prev||prev===0)return '<span class="ins-card-delta neutral">Sin datos previos</span>';
    var pct=Math.round(((cur-prev)/prev)*100);
    var up=invert?(pct<0):(pct>=0);
    return '<span class="ins-card-delta '+(up?'up':'down')+'">'+(pct>=0?'↑ +':'↓ ')+pct+'% vs mes anterior</span>';
  }

  var pctVar=costTot>0?Math.round((costVar/costTot)*100):0;
  var pctFij=100-pctVar;
  var ml=marginLabel(margenNeto);

  var h='<div class="sec-block">';
  h+='<div class="sec-block-head"><span class="sec-block-title">📊 Salud del negocio</span>';
  h+='<span style="font-size:12px;color:var(--t3)">Últimos 6 meses</span></div>';
  h+='<div class="sec-block-body">';

  // Diagnóstico banner
  h+='<div class="diag-banner '+diag.cls+'">';
  h+='<div class="diag-icon">'+diag.icon+'</div>';
  h+='<div><div class="diag-title">'+diag.title+'</div><div class="diag-sub">'+diag.sub+'</div></div>';
  h+='</div>';

  // Financial cards row 1
  h+='<div class="ins-fin-grid">';
  h+=insCard('Ventas del mes',fmt(venMes),delta(venMes,venPrev,false),'Facturación bruta');
  h+=insCard('Costos totales',fmt(costTot),delta(costTot,(ins.costos_var[n-2]||0)+(ins.costos_fijos[n-2]||0),true),'Variables + fijos');
  h+=insCard('Ganancia bruta',fmt(ganBruta),delta(ganBruta,(ins.ventas[n-2]||0)-(ins.costos_var[n-2]||0),false),'Ventas − costos variables');
  h+=insCard('Ganancia neta',fmt(ganNeta),'<span class="margin-chip '+ml.cls+'">'+ml.lbl+'</span>','Ventas − todos los costos');
  h+='</div>';

  // Cost breakdown bar
  h+='<div style="background:var(--bg);border-radius:var(--r1);padding:14px;margin-bottom:16px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<span style="font-size:12px;font-weight:600;color:var(--t2)">Estructura de costos</span>';
  h+='<span style="font-size:12px;color:var(--t3)">Total: '+fmt(costTot)+'</span></div>';
  h+='<div class="cost-bar-track"><div class="cost-bar-var" style="width:'+pctVar+'%"></div><div class="cost-bar-fix" style="width:'+pctFij+'%"></div></div>';
  h+='<div class="cost-bar-legend">';
  h+='<div class="cost-legend-item"><div class="cost-legend-dot" style="background:var(--br)"></div>Variables: '+fmt(costVar)+' ('+pctVar+'%)</div>';
  h+='<div class="cost-legend-item"><div class="cost-legend-dot" style="background:#FBBF24"></div>Fijos: '+fmt(costFij)+' ('+pctFij+'%)</div>';
  h+='</div></div>';

  // Margin + ticket row
  h+='<div class="ins-fin-grid" style="margin-bottom:16px">';
  h+=insCard('Margen bruto',margenBruto+'%',delta(margenBruto,(ins.ventas[n-2]>0?Math.round(((ins.ventas[n-2]-ins.costos_var[n-2])/ins.ventas[n-2])*100):0),false),'Referencia sector: 50–65%');
  h+=insCard('Margen neto',margenNeto+'%','<span class="margin-chip '+ml.cls+'">'+ml.lbl+'</span>','Referencia sector: 25–40%');
  h+=insCard('Ticket promedio',fmt(ticket),delta(ticket,ticketPrev,false),pedidosMes+' pedidos este mes');
  h+=insCard('Pedidos del mes',String(pedidosMes),delta(pedidosMes,ins.pedidos_mes[n-2]||0,false),'Frecuencia de operación');
  h+='</div>';

  // Chart
  h+='<div style="margin-bottom:16px">';
  h+='<div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:10px">Evolución mensual</div>';
  h+='<div style="height:240px;position:relative"><canvas id="insight-chart" style="width:100%;height:100%"></canvas></div>';
  h+='</div>';

  // Signals
  var signals=buildSignals(u,margenNeto,pctMes,tendencia);
  if(signals.length){
    h+='<div style="background:var(--bg);border-radius:var(--r1);padding:14px">';
    h+='<div style="font-size:12px;font-weight:700;color:var(--t1);margin-bottom:8px">Señales del negocio</div>';
    signals.forEach(function(s){
      h+='<div class="signal-item">';
      h+='<div class="signal-icon">'+s.icon+'</div>';
      h+='<div class="signal-text"><div class="signal-title">'+s.title+'</div><div class="signal-desc">'+s.desc+'</div></div>';
      h+='</div>';
    });
    h+='</div>';
  }

  h+='</div></div>';
  return h;
}

function insCard(lbl,val,delta,sub){
  return '<div class="ins-card"><div class="ins-card-lbl">'+esc(lbl)+'</div>'
    +'<div class="ins-card-val">'+val+'</div>'
    +delta
    +'<div class="ins-card-sub">'+esc(sub)+'</div></div>';
}

function buildSignals(u,margenNeto,pctMes,tendencia){
  var signals=[];
  var ins=u.insights;
  var n=ins.ventas.length;
  var venMes=ins.ventas[n-1]||0;

  // Upgrade potential
  if(venMes>200000&&u.actividad.sesiones_30d>=15){
    signals.push({icon:'💡',title:'Potencial de upgrade',
      desc:'Factura '+fmt(venMes)+'/mes y usa el sistema intensivamente. Podría beneficiarse de funciones avanzadas en un plan Pro.'});
  }
  // Star client
  if(margenNeto>=30&&pctMes>=10){
    signals.push({icon:'🚀',title:'Cliente estrella',
      desc:'Margen neto sólido ('+margenNeto+'%) con crecimiento sostenido. Este cliente aprovecha bien el sistema y su negocio está en expansión.'});
  }
  // Low margin
  if(margenNeto>0&&margenNeto<20){
    signals.push({icon:'⚠️',title:'Margen neto bajo',
      desc:'El '+margenNeto+'% está por debajo del promedio del sector gastronómico (25–40%). Puede estar subpreciando productos o con costos elevados.'});
  }
  // Critical
  if(margenNeto<=0&&venMes>0){
    signals.push({icon:'🚨',title:'Operando a pérdida',
      desc:'Los costos totales superan las ventas. El negocio necesita una revisión urgente de precios y estructura de costos.'});
  }
  // Declining 3 months
  var ventas3=ins.ventas.slice(-3);
  if(ventas3[0]>0&&ventas3[2]<ventas3[0]*0.8){
    signals.push({icon:'📉',title:'Caída sostenida de ventas',
      desc:'Las ventas cayeron más del 20% en los últimos 3 meses. Puede necesitar apoyo comercial o hay un problema estacional.'});
  }
  // Low system usage
  if(u.actividad.sesiones_30d<5&&u.persona.fecha_registro<'2026-05-01'){
    signals.push({icon:'📋',title:'Subutiliza el sistema',
      desc:'Solo '+u.actividad.sesiones_30d+' sesiones en 30 días. El usuario podría no estar aprovechando las funcionalidades que tiene disponibles.'});
  }
  // Low recipe ratio
  var ratioRecetas=u.actividad.productos>0?u.actividad.recetas/u.actividad.productos:1;
  if(ratioRecetas<0.4&&u.actividad.productos>=5){
    signals.push({icon:'📝',title:'Pocas recetas cargadas',
      desc:'Solo '+u.actividad.recetas+' recetas para '+u.actividad.productos+' productos. Puede no estar controlando el costo real de la mayoría de lo que vende.'});
  }
  // Stable — positive signal
  if(!signals.length){
    signals.push({icon:'✅',title:'Sin alertas',
      desc:'El negocio opera dentro de parámetros normales. Sin señales de riesgo detectadas.'});
  }
  return signals;
}

function drawInsightChart(u){
  var canvas=$('insight-chart');
  if(!canvas)return;
  var ins=u.insights;
  var ctx=canvas.getContext('2d');
  if(window._insightChart)window._insightChart.destroy();
  window._insightChart=new Chart(ctx,{
    type:'line',
    data:{
      labels:ins.meses,
      datasets:[
        {label:'Ventas',data:ins.ventas,borderColor:'#FA0050',backgroundColor:'rgba(250,0,80,.08)',tension:.4,fill:true,borderWidth:2,pointRadius:3,pointBackgroundColor:'#FA0050'},
        {label:'Costos totales',data:ins.ventas.map(function(v,i){return(ins.costos_var[i]||0)+(ins.costos_fijos[i]||0);}),borderColor:'#FBBF24',backgroundColor:'transparent',tension:.4,fill:false,borderWidth:2,pointRadius:3,pointBackgroundColor:'#FBBF24',borderDash:[4,3]},
        {label:'Ganancia neta',data:ins.ventas.map(function(v,i){return v-((ins.costos_var[i]||0)+(ins.costos_fijos[i]||0));}),borderColor:'#16A34A',backgroundColor:'transparent',tension:.4,fill:false,borderWidth:2,pointRadius:3,pointBackgroundColor:'#16A34A'}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:11},boxWidth:10,padding:16,color:'#6B6B78'}},tooltip:{mode:'index',intersect:false,callbacks:{label:function(c){return c.dataset.label+': $'+c.parsed.y.toLocaleString('es-AR');}}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'DM Sans',size:11},color:'#AFAFB8'}},
        y:{grid:{color:'#F2F2F4'},ticks:{font:{family:'DM Sans',size:11},color:'#AFAFB8',callback:function(v){return v>=1000?'$'+(v/1000)+'k':'$'+v;}}}
      }
    }
  });
}

function guardarPersona(uid){
  var u=userById(uid);if(!u)return;
  var n=$('ep-nombre')&&$('ep-nombre').value.trim();
  var a=$('ep-apellido')&&$('ep-apellido').value.trim();
  if(!n||!a){alert('Nombre y apellido son obligatorios.');return;}
  u.persona.nombre=n; u.persona.apellido=a;
  u.persona.email=$('ep-email').value.trim()||u.persona.email;
  u.persona.tel=$('ep-tel').value.trim();

  var u=userById(uid);

  body+='</div>';

  body+='<select class="fs" id="sus-motivo"><option value="falta_pago">Falta de pago</option><option value="solicitud">Solicitud propia</option><option value="fraude">Uso indebido</option><option value="otro">Otro</option></select></div>';
  body+='<div class="fg"><label class="fl">Mensaje que verá el usuario en la app *</label>';
  body+='<textarea class="fta" id="sus-msg" rows="5">'+esc(defaultMsg)+'</textarea>';
  body+='</div>';
  body+='<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">';
  body+='<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>';
  body+='<button class="btn btn-danger" onclick="confirmarSuspension(\''+uid+'\')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg> Suspender cuenta</button>';
  body+='</div>';
  openModal('Suspender cuenta', body);
}

function confirmarSuspension(uid){
  var u=userById(uid);
  if(!u)return;
  var msg=$('sus-msg')&&$('sus-msg').value.trim();
  if(!msg){alert('El mensaje para el usuario es obligatorio.');return;}
  guardarCliente(uid,{estado:'suspendido',suspension_msg:msg}).then(function(){
    u.estado='suspendido';
    u.suspension_msg=msg;
    closeModal();
    showToast('🚫 '+u.empresa.nombre_comercial+' suspendida');
    refreshBadges();
    renderUserDet();
  }).catch(function(e){ alert('Error al suspender: '+e.message); });
}

function reactivar(uid){

  if(!u)return;
  if(!confirm('¿Reactivar la cuenta de '+u.empresa.nombre_comercial+'?'))return;

  body+='</div>';

  body+='<div class="fg"><label class="fl">Referencia / Comprobante</label><input class="fi" id="pago-ref" placeholder="ej: REF-001 o MP-9923"></div>';
  body+='</div>';

  body+='<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>';
  body+='<button class="btn btn-primary" onclick="guardarPago()">💳 Registrar pago</button>';
  body+='</div>';
  openModal('Registrar pago', body);
}

function guardarPago(){
  var uid=$('pago-uid')&&$('pago-uid').value;
  var monto=parseFloat($('pago-monto')&&$('pago-monto').value)||0;
  var fecha=$('pago-fecha')&&$('pago-fecha').value;
  if(!uid||!monto||!fecha){alert('Completá los campos obligatorios.');return;}
  var pago={
    fecha:fecha,monto:monto,
    metodo:$('pago-metodo').value,
    ref:$('pago-ref').value||'—',
    estado:'acreditado',
    periodo:$('pago-periodo').value||'—'
  };
  var id='p'+Date.now();
  window._fbSetDoc(window._fbDoc(window._db,'clientes',uid,'pagos',id), pago).then(function(){
    pago.id=id; pago.uid=uid;
    DB.pagos.push(pago);
    var u=userById(uid);
    var reactivarAhora = u && u.estado==='suspendido' && confirm('Pago registrado. ¿Querés reactivar la cuenta de '+u.empresa.nombre_comercial+' ahora?');
    var p2 = reactivarAhora ? guardarCliente(uid,{estado:'activo',suspension_msg:''}).then(function(){u.estado='activo';u.suspension_msg='';}) : Promise.resolve();
    p2.then(function(){
      closeModal();
      showToast('✅ Pago registrado');
      refreshBadges();
      if(ST.section==='userDet')renderUserDet();
      else if(ST.section==='pagos')renderPagos();
    });
  }).catch(function(e){ alert('Error al registrar el pago: '+e.message); });
}

// ── CONFIRMAR PAGO PENDIENTE ──
function confirmarPago(pid){
  var p=DB.pagos.find(function(x){return x.id===pid;});
  if(!p)return;
  var u=userById(p.uid);
  if(!confirm('¿Confirmar pago de '+(u?u.empresa.nombre_comercial:'este cliente')+'?'))return;
  window._fbSetDoc(window._fbDoc(window._db,'clientes',p.uid,'pagos',p.id), {estado:'acreditado'}, {merge:true}).then(function(){
    p.estado='acreditado';
    showToast('✅ Pago confirmado');
    refreshBadges();
    if(ST.section==='userDet')renderUserDet();
    else renderPagos();
  }).catch(function(e){ alert('Error al confirmar: '+e.message); });
}

async function guardarNuevoUser(){
  var nombre=($('nu-nombre')&&$('nu-nombre').value||'').trim();
  var apellido=($('nu-apellido')&&$('nu-apellido').value||'').trim();
  var neg=($('nu-negocio')&&$('nu-negocio').value||'').trim();
  var email=($('nu-email')&&$('nu-email').value||'').trim();
  var tel=($('nu-tel')&&$('nu-tel').value||'').trim();
  if(!nombre||!apellido||!neg||!email){alert('Completá nombre, apellido, negocio y email.');return;}
  var chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  var seg=function(n){var s='';for(var i=0;i<n;i++)s+=chars[Math.floor(Math.random()*chars.length)];return s;};
  var key='GPT-'+seg(4)+'-'+seg(4);
  var tempPass=seg(4)+seg(4); // contraseña provisoria — el cliente debería cambiarla con "¿Olvidaste tu contraseña?"
  var estado=$('nu-estado').value;

  var btn=document.querySelector('#modal-body .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Creando…';}

  try{
    // App secundaria de Firebase: crea la cuenta sin cerrar la sesión del admin
    var secApp = window._fbInitApp(window._fbConfig, 'secondary-'+Date.now());
    var secAuth = window._fbGetAuth(secApp);
    var cred = await window._fbCreateUser(secAuth, email, tempPass);
    var newUid = cred.user.uid;
    await window._fbSignOut(secAuth);

    await guardarCliente(newUid, {
      estado: estado, plan: estado==='trial'?'—':'Base',
      fecha_vencimiento: $('nu-vence').value, license_key: key,
      suspension_msg:'', notas:'', fecha_alta: hoyStr(),
      negocio_precarga: neg, nombre_precarga: nombre, apellido_precarga: apellido,
      email_precarga: email, tel_precarga: tel
    });
    // El doc users/{uid} se autogenera con los datos de ejemplo (SEED) la primera vez que el cliente inicia sesión.

    closeModal();
    showToast('✅ Usuario creado · clave: '+key);
    alert('Cuenta creada.\n\nEmail: '+email+'\nContraseña provisoria: '+tempPass+'\n\nCompartisela al cliente y pedile que la cambie con "¿Olvidaste tu contraseña?" en el primer inicio de sesión.');
    await cargarDatosReales();
    refreshBadges();
    nav('usuarios');
  }catch(e){
    var msg='Error al crear la cuenta';
    if(e.code==='auth/email-already-in-use')msg='Ya existe una cuenta con ese email';
    if(e.code==='auth/invalid-email')msg='El email no es válido';
    alert(msg+' ('+e.message+')');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='+ Crear usuario';}
  }
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
var toastTimer;
function showToast(msg){
  clearTimeout(toastTimer);
  var t=$('toast');
  t.textContent=msg;
  t.classList.add('show');
  toastTimer=setTimeout(function(){t.classList.remove('show');},2600);
}

// ── Keyboard close modal ──
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeModal();
});

// ═══════════════════════════════════════════════════
//  AUTH / BOOT
// ═══════════════════════════════════════════════════
function showScreen(id){
  ['loading-screen','login-screen','layout'].forEach(function(s){
    document.getElementById(s).style.display = (s===id) ? '' : 'none';
  });
}

function adminLogin(){
  var email=($('ad-email')&&$('ad-email').value||'').trim();
  var pass=($('ad-pass')&&$('ad-pass').value||'').trim();
  var err=$('login-error');
  err.style.display='none';
  if(!email||!pass){ err.textContent='Completá email y contraseña.'; err.style.display='block'; return; }
  window._fbSignIn(window._auth,email,pass).catch(function(e){
    var msg='Error al iniciar sesión';
    if(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password')msg='Email o contraseña incorrectos';
    if(e.code==='auth/user-not-found')msg='No existe una cuenta con ese email';
    if(e.code==='auth/too-many-requests')msg='Demasiados intentos. Esperá unos minutos.';
    err.textContent=msg; err.style.display='block';
  });
}
window.adminLogin = adminLogin;

function adminLogout(){
  if(!confirm('¿Cerrar sesión del panel de administración?'))return;
  window._fbSignOut(window._auth);
}
window.adminLogout = adminLogout;

function _bootAdmin(){
  window._fbOnAuth(window._auth, function(user){
    if(user && user.uid===ADMIN_UID){
      showScreen('loading-screen');
      var emailEl=$('sb-admin-email'); if(emailEl)emailEl.textContent=user.email||'Admin';
      cargarDatosReales().then(function(){
        showScreen('layout');
        refreshBadges();
        nav('dashboard');
      }).catch(function(e){
        showScreen('login-screen');
        $('login-error').textContent='Error al cargar datos: '+e.message;
        $('login-error').style.display='block';
      });
    } else if(user){
      // Logueado pero no es el admin — no debería pasar con las reglas de Firestore, pero por las dudas
      window._fbSignOut(window._auth);
      showScreen('login-screen');
      $('login-error').textContent='Esta cuenta no tiene permisos de administrador.';
      $('login-error').style.display='block';
    } else {
      showScreen('login-screen');
    }
  });
}
if(window._fbReady){ _bootAdmin(); }
else { window._fbReadyCb = _bootAdmin; }
</script>
